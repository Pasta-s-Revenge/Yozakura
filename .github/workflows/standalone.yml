name: Standalone bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: yozakura-linux-x86_64
          - os: windows-latest
            artifact: yozakura-windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip ".[standalone]"

      - name: Build and smoke-test bundle
        run: python scripts/build-standalone.py --clean

      - name: Upload standalone bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/yozakura/
          if-no-files-found: error
